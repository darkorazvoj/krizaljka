name: postgres-krizaljka
services:
  postgres:
    image: postgres:16
    container_name: krizaljkadb
    restart: always
    environment:
      POSTGRES_USER: ${postgres_user}
      POSTGRES_PASSWORD: ${postgres_password}
      POSTGRES_DB: ${postgres_db}
    ports:
      - "5434:5432" 
    volumes:
      - pg_kr_data:/var/lib/postgresql/data
    networks:
      - kr_net

volumes:
  pg_kr_data:

networks:
  kr_net:
    name: kr_net
    external: true 